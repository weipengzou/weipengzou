name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 生成 Stats Card
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      # 生成 Contribution Heatmap (Snake)
      - name: Generate contribution heatmap (snake)
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile/github-contribution-grid-snake.svg
        env:
          GITHUB_TOKEN: ${{ secrets.README_STATS_TOKEN }}

      # 提交生成的图
      - name: Commit cards and heatmap
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards and contribution heatmap" || exit 0
          git push
