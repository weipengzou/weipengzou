name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"   # 每天 3 点更新
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # 生成 GitHub Stats Card
      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&count_private=true&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      # 生成 Profile Summary Cards
      - name: Generate profile summary cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.README_STATS_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}

      # 提交生成的图
      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg profile-summary-card-output/**/*.svg
          git commit -m "Update README cards" || exit 0
          git push
